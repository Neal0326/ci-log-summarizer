name: CI Log Summarizer
description: Summarize failed GitHub Actions logs into a short, useful report for developers.
author: OpenAI Codex

inputs:
  github-token:
    description: GitHub token used to list workflow jobs, download logs, and write PR comments.
    required: true
  openai-api-key:
    description: OpenAI API key used to generate the AI log summary.
    required: false
  model:
    description: OpenAI model to use for the summary.
    required: false
    default: gpt-4.1-mini
  mode:
    description: Output mode (full | short)
    required: false
    default: short

outputs:
  summary-status:
    description: Whether the summary was generated by OpenAI, a fallback summarizer, or skipped.
  failed-job-count:
    description: Number of failed jobs found in the current workflow run attempt.
  pull-request-commented:
    description: Whether the action successfully created or updated a pull request comment.

runs:
  using: node20
  main: dist/index.js

branding:
  color: orange
  icon: file-text
